<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCCom – Survivors</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #10101a;
      --accent: #e63946;
      --accent2: #ff6b35;
      --text: #e0e0e0;
      --muted: #555570;
      --border: #1e1e2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Tło z siatką */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #fff;
    }

    .logo span {
      color: var(--accent);
    }

    nav {
      display: flex;
      gap: 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 5rem 2rem 3rem;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 60px rgba(230,57,70,0.3);
      margin-bottom: 1rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    /* Sekcja gry */
    .game-section {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .game-wrapper {
      position: relative;
      border: 1px solid var(--accent);
      box-shadow:
        0 0 0 1px rgba(230,57,70,0.1),
        0 0 40px rgba(230,57,70,0.15),
        inset 0 0 40px rgba(0,0,0,0.5);
      background: #000;
    }

    .game-wrapper::before,
    .game-wrapper::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
      z-index: 2;
    }

    .game-wrapper::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }

    .game-wrapper::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    .game-topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .btn-fullscreen {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-fullscreen:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 15px rgba(230,57,70,0.4);
    }

    .btn-fullscreen svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Sterowanie */
    .controls-section {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .control-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .key {
      background: var(--bg);
      border: 1px solid var(--muted);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.3rem 0.6rem;
      min-width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .control-desc {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .leaderboard {
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .leaderboard-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-icon {
      font-size: 0.9rem;
    }

    .leaderboard-body {
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      color: var(--text);
      min-height: 40px;
    }

    .lb-header {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .lb-header-rank { width: 30px; }
    .lb-header-name { flex: 1; text-align: left; }
    .lb-header-time { width: 50px; text-align: center; }
    .lb-header-score { width: 60px; text-align: right; }

    .lb-row {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .lb-row:hover {
      background: rgba(255,255,255,0.04);
    }

    .lb-rank {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      width: 30px;
      text-align: left;
      color: var(--muted);
    }

    .lb-rank.gold { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }

    .lb-name {
      flex: 1;
      text-align: left;
      padding-left: 0.3rem;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .lb-time {
      width: 50px;
      text-align: center;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
    }

    .lb-score {
      width: 60px;
      text-align: right;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      color: var(--accent2);
      font-size: 0.85rem;
    }

    .lb-empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 0.5rem 0;
    }

    .lb-loading {
      color: var(--muted);
      text-align: center;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    footer span { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="logo">MC<span>Com</span></div>
    <nav>
      <a href="#">Start</a>
      <a href="#">O nas</a>
      <a href="#">Projekty</a>
      <a href="#">Kontakt</a>
    </nav>
  </header>

  <section class="hero">
    <p class="hero-label">// projekt gamingowy</p>
    <h1>MCCom<br><em>Survivors</em></h1>
    <p>Przeżyj jak najdłużej. Pokonaj fale przeciwników. Zostań legendą.</p>
  </section>

  <section class="game-section">
    <div class="game-wrapper" id="gameWrapper">
      <div class="game-topbar">
        <button class="btn-fullscreen" onclick="toggleFullscreen()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
          </svg>
          Fullscreen
        </button>
      </div>

      <div class="iframe-container" id="iframeContainer">
        <iframe
          id="gameFrame"
          src="mccom_survivors.html"
          allowfullscreen
          allow="autoplay; fullscreen"
        ></iframe>
      </div>

      <div class="leaderboard" id="leaderboard">
        <div class="leaderboard-header">
          <span class="leaderboard-icon">🏆</span> LEADERBOARD
        </div>
        <div class="leaderboard-body" id="leaderboardBody">
          <div class="lb-loading">Loading...</div>
        </div>
      </div>
    </div>
  </section>

  <section class="controls-section">
    <div class="section-title">Sterowanie</div>
    <div class="controls-grid">
      <div class="control-item">
        <div class="key">WASD / ↑ ↓ → ←</div>
        <div class="control-desc">Ruch postaci</div>
      </div>
      <div class="control-item">
        <div class="key">ESC</div>
        <div class="control-desc">Pauza</div>
      </div>
      <div class="control-item">
        <div class="key">F</div>
        <div class="control-desc">Pełny ekran</div>
      </div>
    </div>
  </section>

  <footer>
    &copy; 2026 <span>MCCom</span> — Wszelkie prawa zastrzeżone
  </footer>

  <script>
    function toggleFullscreen() {
      const container = document.getElementById('iframeContainer');
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch(err => {
          alert('Błąd fullscreen: ' + err.message);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function renderLeaderboard() {
      const body = document.getElementById('leaderboardBody');
      try {
        const raw = localStorage.getItem('mccom_leaderboard');
        if (!raw || raw === '[]') {
          body.innerHTML = '<div class="lb-empty">No scores yet. Play the game!</div>';
          return;
        }
        const entries = JSON.parse(raw);
        if (!entries.length) {
          body.innerHTML = '<div class="lb-empty">No scores yet. Play the game!</div>';
          return;
        }
        entries.sort((a, b) => b.score - a.score);
        const top = entries.slice(0, 10);
        let html = '';
        const rankClass = ['gold', 'silver', 'bronze'];
        html += '<div class="lb-header">'
          + '<span class="lb-header-rank">#</span>'
          + '<span class="lb-header-name">Player</span>'
          + '<span class="lb-header-time">Time</span>'
          + '<span class="lb-header-score">Score</span>'
          + '</div>';
        top.forEach((e, i) => {
          const secs = Math.floor(e.time || 0);
          const timeStr = String(Math.floor(secs / 60)).padStart(2, '0') + ':' + String(secs % 60).padStart(2, '0');
          const name = e.name || 'Player';
          const rc = rankClass[i] || '';
          html += '<div class="lb-row">'
            + '<span class="lb-rank ' + rc + '">#' + (i + 1) + '</span>'
            + '<span class="lb-name">' + name + '</span>'
            + '<span class="lb-time">' + timeStr + '</span>'
            + '<span class="lb-score">' + e.score + '</span>'
            + '</div>';
        });
        body.innerHTML = html;
      } catch (e) {
        body.innerHTML = '<div class="lb-empty">Could not load leaderboard.</div>';
      }
    }

    renderLeaderboard();
    window.addEventListener('storage', renderLeaderboard);
  </script>

</body>
</html>
